[tools]
go = "1.26.0"

[tasks]
gen-gin = "go tool oapi-codegen -generate gin -package gen ../tsp-output/schema/openapi.yaml > internal/gen/gin.go"
gen-spec = "go tool oapi-codegen -generate spec -package gen ../tsp-output/schema/openapi.yaml > internal/gen/spec.go"
gen-types = "go tool oapi-codegen -generate types -package gen ../tsp-output/schema/openapi.yaml > internal/gen/types.go"
gen-client = "go tool oapi-codegen -generate client -package gen ../tsp-output/schema/openapi.yaml > internal/gen/client.go"
gen-all = { depends = ["gen-gin", "gen-spec", "gen-types", "gen-client"] }

install-tools = { run = [
    "go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1",
    "go install golang.org/x/tools/gopls@v0.21.1",
    "go install github.com/go-delve/delve/cmd/dlv@v1.26.0",
    "go install github.com/air-verse/air@v1.64.5",
] }
